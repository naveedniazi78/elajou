<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>    مديرة سمر   </title>

    <style>
        /* Full page animated gradient background */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(270deg, #ff6b6b, #6bc1ff, #fffa6b, #8aff6b);
            background-size: 800% 800%;
            animation: gradientBG 20s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated Heading */
        h1 {
            text-align: center;
            margin: 40px 0;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
            animation: fadeInDown 1.2s ease-in-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .tab {
            padding: 12px 25px;
            cursor: pointer;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            margin: 0 8px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .red { background-color: #d9534f; }
        .green { background-color: #28a745; }
        .blue { background-color: #007bff; }
        .orange { background-color: #fd7e14; }
        .purple { background-color: #6f42c1; }

        .tab:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        .tab.active {
            font-weight: bold;
            box-shadow: 0 -3px 0 #000 inset;
        }

        /* Moving Cursor Text */
        .cursor-text {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
            z-index: 1000;
        }
    </style>

    <script>
        function openSite(element, url) {
            var tabs = document.getElementsByClassName("tab");
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }
            element.classList.add("active");
            window.open(url, "_blank");
        }

        // Moving cursor text
        document.addEventListener("mousemove", function(e) {
            var cursor = document.getElementById("cursorText");
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
        });
    </script>
</head>

<body>

    <h1>    مديرة سمر   </h1>

    <div class="tabs">
        <div class="tab red active" onclick="openSite(this, 'https://www.msn.com')">MSN</div>
        <div class="tab green" onclick="openSite(this, 'https://www.google.com')">Google</div>
        <div class="tab blue" onclick="openSite(this, 'https://www.bing.com')">Bing</div>
        <div class="tab orange" onclick="openSite(this, 'https://www.yahoo.com')">Yahoo</div>
        <div class="tab purple" onclick="openSite(this, 'https://www.github.com')">GitHub</div>
    </div>

    <!-- Moving Cursor Text -->
    <div id="cursorText" class="cursor-text">مديرة سمر</div>

</body>
</html>
